<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HarmonyRedirct</title>
    
    <!-- 0.3 Second Delay Script -->
    <script>
        setTimeout(function() {
            window.location.href = "https://harmony.horizensearch.com/home"; // Replace with your link
        }, 300); // 300 milliseconds = 0.3 seconds
    </script>

    <!-- Modern Dark Minimalist Styling -->
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #0b0f19;
            color: #f3f4f6;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
        }

        .container {
            text-align: center;
            flex-grow: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }

        /* Animated Glowing Spinner */
        .spinner {
            width: 50px;
            height: 50px;
            border: 3px solid rgba(99, 102, 241, 0.1);
            border-radius: 50%;
            border-top-color: #6366f1;
            box-shadow: 0 0 15px rgba(99, 102, 241, 0.5);
            animation: spin 0.8s linear infinite;
            margin: 0 auto 20px;
        }

        h1 {
            font-size: 1.25rem;
            font-weight: 500;
            letter-spacing: 0.5px;
            margin: 0;
            background: linear-gradient(45deg, #a78bfa, #6366f1);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        /* Powered By Branding footer */
        .brand-footer {
            font-size: 0.85rem;
            color: #6b7280;
            margin-bottom: 30px;
            letter-spacing: 1px;
            text-transform: uppercase;
        }

        .brand-footer span {
            color: #9ca3af;
            font-weight: 600;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="spinner"></div>
        <h1>Connecting To Horizen...</h1>
    </div>

    <!-- Powered By Text -->
    <div class="brand-footer">
        Powered by <span>HorizenDataBase</span>
    </div>

</body>
</html>
